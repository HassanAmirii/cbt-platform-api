openapi: 3.0.0
info:
  title: cbt api
  version: 1.0.0
  description: API for CBT application
servers:
  - url: https://cbt-platform-api.onrender.com/api/v1
    description: Production
  - url: http://localhost:3000/api/v1
    description: Development
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [username, email, password, level]
      properties:
        username:
          type: string
          minLength: 4
          maxLength: 30
          pattern: ^[a-zA-Z0-9]+$
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        level:
          type: string
          enum: ["100", "200", "300", "400"]
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
    StartExamRequest:
      type: object
      required: [courseCode, limit]
      properties:
        courseCode:
          type: string
          pattern: ^[A-Z0-9]+$
        limit:
          description: questions count to send
          type: number
          enum: [35, 60, 100]
    AnswerItem:
      type: object
      required: [questionId, selected]
      properties:
        questionId:
          type: string
          minLength: 24
          maxLength: 24
          pattern: ^[a-fA-F0-9]{24}$
        selected:
          type: string
          enum: [A, B, C, D]
    SubmitExamRequest:
      type: object
      required: [attemptId, answers]
      properties:
        attemptId:
          type: string
          minLength: 24
          maxLength: 24
          pattern: ^[a-fA-F0-9]{24}$
        answers:
          type: array
          description: Must contain exactly 35, 60, or 100 answers.
          items:
            $ref: "#/components/schemas/AnswerItem"
          oneOf:
            - minItems: 35
              maxItems: 35
            - minItems: 60
              maxItems: 60
            - minItems: 100
              maxItems: 100
    ResultPagination:
      type: object
      properties:
        totalResults:
          type: integer
          example: 12
        totalPages:
          type: integer
          example: 2
        limit:
          type: integer
          example: 10
        currentPage:
          type: integer
          example: 1
    StudentResultsResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        results:
          type: array
          description: Paginated list of result documents for the authenticated student
          items:
            type: object
            additionalProperties: true
        pagination:
          $ref: "#/components/schemas/ResultPagination"
paths:
  /:
    get:
      summary: Root health status
      responses:
        "200":
          description: API service is running (health check)
  /health:
    get:
      summary: Dedicated health check endpoint
      responses:
        "200":
          description: Service is healthy
  /api/v1/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
        "400":
          description: Bad request
        "409":
          description: field already exists
  /api/v1/login:
    post:
      summary: Login a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: User logged in successfully
        "400":
          description: Bad request
        "401":
          description: unauthorized invalid credentials
  /api/v1/start-exam:
    post:
      summary: get sets of exam questions
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartExamRequest"
      responses:
        "200":
          description: questions generated successfully
        "400":
          description: Bad request, validation failed for request body.
        "401":
          description: unauthorized invalid credentials
        "404":
          description: not found, If no questions are found for the given criteria.
  /api/v1/submit-exam:
    post:
      summary: submit exam answers and get results
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitExamRequest"
      responses:
        "200":
          description: exam submitted successfully, results returned
        "400":
          description: Bad request, validation failed for request body.
        "401":
          description: unauthorized invalid credentials
        "403":
          description: attemptId does not belong to current user
        "410":
          description: Attempt already submitted or session expired
  /api/v1/results:
    get:
      summary: Get authenticated student result history
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for paginated results
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 10
          description: Number of results per page
      responses:
        "200":
          description: Student results fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentResultsResponse"
        "401":
          description: unauthorized invalid credentials
